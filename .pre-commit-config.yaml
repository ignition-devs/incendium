repos:
  - repo: https://github.com/aio-libs/sort-all
    rev: v1.3.0
    hooks:
      - id: sort-all
        name: sort-all
        files: ^src/
  - repo: https://github.com/bwhmather/ssort
    rev: 0.16.0
    hooks:
      - id: ssort
        files: ^src/
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.1
    hooks:
      - id: black
  - repo: https://github.com/hakancelikdev/unimport
    rev: 1.3.1
    hooks:
      - id: unimport
        files: ^src/
        language_version: python3.12
  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: isort-package
        files: ^src/
        args: [--settings-file=tox.ini]
      - id: isort
        name: isort-stubs
        files: ^stubs/stubs/
        args: [--settings-file=stubs/tox.ini]
  - repo: https://github.com/PyCQA/docformatter
    rev: v1.7.7
    hooks:
      - id: docformatter
        args: [--config, tox.ini]
        files: ^src/
        language_version: python3.12
  - repo: https://github.com/coatl-dev/flake8
    rev: 5.0.4
    hooks:
      - id: flake8
        name: flake8-package
        args: [--config=tox.ini]
        files: ^src/
        additional_dependencies: [pydoclint]
        language_version: python3.12
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        name: flake8-stubs
        types: [file]
        files: \.(pyi)$
        additional_dependencies: [flake8-pyi]
        args: [--config=stubs/tox.ini]
  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        files: ^src/
        args: [--config=tox.ini]
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
      - id: commitizen-branch
        stages: [pre-push]
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: pylint
        language: system
        files: ^src/
        types: [python]
