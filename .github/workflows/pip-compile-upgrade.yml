name: pip-compile-upgrade

on:
  schedule:
    - cron: '0 20 14,28 * *'
  workflow_dispatch:

jobs:
  pip-compile-upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Upgrade package requirements
        id: pip-compile-upgrade-package
        uses: coatl-dev/actions/pip-compile-upgrade@a81a1c9a37205e630d28c561dfc3b605b6e031dd # v7.0.5
        with:
          path: requirements.txt

      - name: Upgrade stubs requirements
        id: pip-compile-upgrade-stubs
        uses: coatl-dev/actions/uv-pip-compile-upgrade@a81a1c9a37205e630d28c561dfc3b605b6e031dd # v7.0.5
        with:
          path: requirements.txt
          python-version: '3.12'
          working-directory: stubs

      - name: Detect changes
        id: git-diff
        uses: coatl-dev/actions/simple-git-diff@a81a1c9a37205e630d28c561dfc3b605b6e031dd # v7.0.5
        with:
          path: ${{ github.workspace }}

      - name: Import GPG key
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        id: gpg-import
        uses: coatl-dev/actions/gpg-import@a81a1c9a37205e630d28c561dfc3b605b6e031dd # v7.0.5
        with:
          passphrase: ${{ secrets.COATL_BOT_GPG_PASSPHRASE }}
          private-key: ${{ secrets.COATL_BOT_GPG_PRIVATE_KEY }}

      - name: Build commit message
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        run: |
          echo "chore(requirements): pip-compile upgrade" > "$RUNNER_TEMP/commit.txt"
          {
              echo ""
              echo "updates:"
              git status --porcelain | awk 'match($1, "M") {print "  - " $2}'
          } >> "$RUNNER_TEMP/commit.txt"

      - name: Commit and push changes
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        run: |
          git checkout -B coatl-dev-pip-compile-upgrade
          git add --update
          git commit --file="${RUNNER_TEMP}/commit.txt"
          git push --force --set-upstream origin coatl-dev-pip-compile-upgrade

      - name: Create pull request
        if: ${{ steps.git-diff.outputs.diff == 'true' }}
        uses: coatl-dev/actions/pr-create@a81a1c9a37205e630d28c561dfc3b605b6e031dd # v7.0.5
        with:
          gh-token: ${{ secrets.COATL_BOT_GH_TOKEN }}
