[tool.commitizen]
gpg_sign = true
name = "cz_conventional_commits"
tag_format = "$version"
version_scheme = "pep440"
version = "2026.5.0"
update_changelog_on_bump = true
version_files = [
  ".copier-answers.yml:project_version",
  "src/incendium/__about__.py:__version__",
  "stubs/pyproject.toml:version"
]
