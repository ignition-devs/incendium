[tox]
requires =
    tox>=4.2
env_list =
    py3{9-12}
skip_missing_interpreters = true

[testenv:py312]
description = install and run type check on code base
deps =
    mypy[python2] @ git+https://github.com/coatl-dev/mypy.git@v0.971
commands =
    mypy stubs

[flake8]
ignore =
    E301, E302, E701, E704,
    F821,
    Y022, Y026, Y034, Y036, Y037
max-line-length = 88

[isort]
extra_standard_library = typing
profile = black
py_version = 27
